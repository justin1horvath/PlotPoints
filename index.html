<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plot Point</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <h1>Plot Point</h1>
        <div id="phase-display" class="phase-display">
          Current phase: None
        </div>
      </header>
      <main>
        <section id="game-panel" class="hero-panel">
          <div class="screen-kicker">New story</div>
          <h2>Start a romantic adventure</h2>
          <p class="screen-helper">
            Begin with private character creation, then pass the device between players.
          </p>
          <button id="start-story-button" class="action-button">
            Start New Story
          </button>
        </section>

        <section class="scoreboard">
          <h2>Scoreboard</h2>
          <div class="score-row">
            <span>Romance Score</span>
            <span id="romance-score">0</span>
          </div>
          <div class="score-row">
            <span>Player 1 Plot Points</span>
            <span id="player1-points">0</span>
          </div>
          <div class="score-row">
            <span>Player 2 Plot Points</span>
            <span id="player2-points">0</span>
          </div>
        </section>

        <section class="debug-panel">
          <h2>AI Log</h2>
          <p class="screen-helper">
            Download the current game's AI request and response history.
          </p>
          <button id="download-ai-log-button" class="secondary-button" type="button">
            Download AI Log
          </button>
        </section>
      </main>
    </div>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
